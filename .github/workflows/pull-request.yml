# Jobs that run on pull_request, but not on merge_group. This is useful for jobs that post comments on Pull Requests, like ESLint annotations.

on:
    pull_request:

permissions:
    contents: write
    pull-requests: write

jobs:
    lint:
        name: Lint (Biome)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: jdx/mise-action@v4

            - run: npm ci

            - run: npx @tanstack/router-cli generate --routesDirectory ./src/routes --generatedRouteTree ./src/routeTree.gen.ts

            - run: npm run ci:lint

    format:
        name: Format (Biome)
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - uses: jdx/mise-action@v4

            - run: npm ci

            - run: npm run ci:format

    typecheck:
        name: Type Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: jdx/mise-action@v4

            - name: Install dependencies
              run: npm ci

            - name: Generate route files
              run: npx @tanstack/router-cli generate --routesDirectory ./src/routes --generatedRouteTree ./src/routeTree.gen.ts

            - name: Type Check
              run: npm run ci:typecheck

    test:
        name: Test (Node ${{ matrix.node-version }})
        runs-on: ubuntu-latest
        timeout-minutes: 10
        strategy:
            matrix:
                node-version: [22.x, 24.x]
            # Don't cancel other matrix jobs if one fails
            fail-fast: false

        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'npm'

            - run: npm ci

            - run: npm run ci:test

    coverage:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v6
            - uses: jdx/mise-action@v4

            - run: npm ci

            - run: npm run test:coverage

            - name: Upload coverage report
              uses: actions/upload-artifact@v7
              with:
                  name: coverage-report
                  path: coverage/
                  retention-days: 14

    build:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v6
            - uses: jdx/mise-action@v4

            - run: npm ci

            - name: Generate route files
              run: npx @tanstack/router-cli generate --routesDirectory ./src/routes --generatedRouteTree ./src/routeTree.gen.ts

            - run: npm run build

            - name: Upload build artifacts
              if: success()
              uses: actions/upload-artifact@v7
              with:
                  name: dist
                  path: dist/
                  retention-days: 1

    build-types:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: jdx/mise-action@v4

            - run: npm ci

            - name: Generate route files
              run: npx @tanstack/router-cli generate --routesDirectory ./src/routes --generatedRouteTree ./src/routeTree.gen.ts

            - run: npm run build:types

    all-checks:
        name: All checks
        if: ${{ !cancelled() }}
        needs: [lint, format, typecheck, test, coverage, build, build-types]
        runs-on: ubuntu-latest
        steps:
            - uses: re-actors/alls-green@release/v1
              with:
                  jobs: ${{ toJSON(needs) }}

    automerge-dependabot:
        if: github.event.pull_request.user.login == 'dependabot[bot]'
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
            contents: write
        steps:
            - uses: actions/checkout@v6

            - name: Enable auto-merge for Dependabot PR
              run: gh pr merge --rebase --auto "${{ github.event.pull_request.number }}"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    biome-lint-fix:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.pull_request.head.ref }}
                  repository: ${{ github.event.pull_request.head.repo.full_name }}
                  token: ${{ secrets.GITHUB_TOKEN }}

            - uses: jdx/mise-action@v4

            - name: Configure Git
              run: |
                  git config --global user.name "GitHub Actions"
                  git config --global user.email "github-actions@github.com"

            - name: Run Biome Lint Fix
              run: |
                  npm ci
                  npx @tanstack/router-cli generate --routesDirectory ./src/routes --generatedRouteTree ./src/routeTree.gen.ts
                  npx @biomejs/biome lint --write .

                  if [[ -n $(git status --porcelain) ]]; then
                    FIX_BRANCH="fix-${{ github.event.pull_request.number }}-biome-lint"
                    git switch --create $FIX_BRANCH

                    git add --all
                    git commit --message "Apply Biome lint fixes."
                    git push --force origin $FIX_BRANCH

                    echo "Biome lint fixes have been pushed to the $FIX_BRANCH branch."
                    exit 1
                  else
                    echo "No changes needed by Biome lint"
                  fi

    biome-format-fix:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.pull_request.head.ref }}
                  repository: ${{ github.event.pull_request.head.repo.full_name }}
                  token: ${{ secrets.GITHUB_TOKEN }}

            - uses: jdx/mise-action@v4

            - name: Configure Git
              run: |
                  git config --global user.name "GitHub Actions"
                  git config --global user.email "github-actions@github.com"

            - name: Run Biome Format
              run: |
                  npm ci
                  npx @biomejs/biome format --write .

                  if [[ -n $(git status --porcelain) ]]; then
                    FIX_BRANCH="fix-${{ github.event.pull_request.number }}-biome-format"
                    git switch --create $FIX_BRANCH

                    git add --all
                    git commit --message "Apply Biome formatting."
                    git push --force origin $FIX_BRANCH

                    echo "Biome formatting fixes have been pushed to the $FIX_BRANCH branch."
                    exit 1
                  else
                    echo "No changes needed by Biome format"
                  fi

    prettier-fix:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.pull_request.head.ref }}
                  repository: ${{ github.event.pull_request.head.repo.full_name }}
                  token: ${{ secrets.GITHUB_TOKEN }}

            - uses: jdx/mise-action@v4

            - name: Configure Git
              run: |
                  git config --global user.name "GitHub Actions"
                  git config --global user.email "github-actions@github.com"

            - name: Run Prettier Fix
              run: |
                  npm ci
                  npx prettier --write "src/**/*.css"

                  if [[ -n $(git status --porcelain) ]]; then
                    FIX_BRANCH="fix-${{ github.event.pull_request.number }}-prettier"
                    git switch --create $FIX_BRANCH

                    git add --all
                    git commit --message "Apply Prettier formatting."
                    git push --force origin $FIX_BRANCH

                    echo "Prettier fixes have been pushed to the $FIX_BRANCH branch."
                    exit 1
                  else
                    echo "No changes needed by Prettier"
                  fi

    pre-commit-fix:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.pull_request.head.ref }}
                  repository: ${{ github.event.pull_request.head.repo.full_name }}
                  token: ${{ secrets.GITHUB_TOKEN }}

            - uses: actions/setup-python@v6
              with:
                  python-version: "3.x"

            - uses: jdx/mise-action@v4

            - name: Configure Git
              run: |
                  git config --global user.name "GitHub Actions"
                  git config --global user.email "github-actions@github.com"

            - name: Run pre-commit Fix
              run: |
                  npm ci
                  npx @tanstack/router-cli generate --routesDirectory ./src/routes --generatedRouteTree ./src/routeTree.gen.ts
                  pre-commit run --all-files || true

                  if [[ -n $(git status --porcelain) ]]; then
                    FIX_BRANCH="fix-${{ github.event.pull_request.number }}-pre-commit"
                    git switch --create $FIX_BRANCH

                    git add --all
                    git commit --message "Apply pre-commit fixes."
                    git push --force origin $FIX_BRANCH

                    echo "Pre-commit fixes have been pushed to the $FIX_BRANCH branch."
                    exit 1
                  else
                    echo "No changes needed by pre-commit"
                  fi

    deploy-preview:
        runs-on: ubuntu-latest
        if: github.actor != 'dependabot[bot]'
        permissions:
            contents: read
            pull-requests: write
            deployments: write
        steps:
            - uses: actions/checkout@v6
            - uses: jdx/mise-action@v4

            - run: just build-ci

            - name: Deploy to Cloudflare Pages
              id: cloudflare-deploy
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  command: pages deploy dist --project-name=factorio-blueprint-playground --branch=${{ github.head_ref }}

            - name: Add Cloudflare preview URL to PR comment
              uses: actions/github-script@v9
              env:
                  DEPLOYMENT_URL: ${{ steps.cloudflare-deploy.outputs.deployment-url }}
                  HEAD_REF: ${{ github.head_ref }}
                  HEAD_SHA: ${{ github.event.pull_request.head.sha }}
              with:
                  script: |
                      const deploymentUrl = process.env.DEPLOYMENT_URL;
                      const projectSubdomain = new URL(deploymentUrl).hostname.split('.').slice(1, -2).join('.');
                      const branchUrl = `https://${process.env.HEAD_REF}.${projectSubdomain}.pages.dev`;
                      const headSha = process.env.HEAD_SHA;
                      const body = [
                        '## Cloudflare Pages Deployment',
                        '',
                        '| | |',
                        '|---|---|',
                        `| **Latest commit:** | \`${headSha}\` |`,
                        '| **Status:** | ✅ Deploy successful! |',
                        `| **Preview URL:** | ${deploymentUrl} |`,
                        `| **Branch Preview URL:** | ${branchUrl} |`,
                      ].join('\n');

                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                      });
                      const botComment = comments.find(c => c.body.includes('Cloudflare Pages Deployment'));

                      if (botComment) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: botComment.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                          body,
                        });
                      }
